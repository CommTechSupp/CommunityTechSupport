<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DIY Tutorials Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #0f172a;
}

header {
  background: linear-gradient(90deg, #60a5fa, #93c5fd);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

.search {
  width: 100%;
  padding: 12px;
  border-radius: 20px;
  border: 1px solid #dbeafe;
  background: #f0f9ff;
  margin-bottom: 15px;
}

.categories {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.cat {
  padding: 6px 12px;
  border-radius: 20px;
  background: #e0f2fe;
  cursor: pointer;
  font-size: 13px;
}

.cat.active {
  background: #3b82f6;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 12px;
}

.card {
  background: #f8fbff;
  border: 1px solid #dbeafe;
  border-radius: 12px;
  padding: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  background: #e0f2fe;
}

.title {
  font-weight: bold;
  font-size: 16px;
}

.desc {
  font-size: 13px;
  color: #475569;
}

.meta {
  font-size: 12px;
  margin-top: 8px;
  color: #64748b;
  display: flex;
  justify-content: space-between;
}

.panel {
  background: #f8fbff;
  border: 1px solid #dbeafe;
  border-radius: 12px;
  padding: 15px;
}

.stat {
  font-size: 14px;
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  height: 70px;
  border-radius: 10px;
  border: 1px solid #dbeafe;
  padding: 10px;
}

button {
  margin-top: 8px;
  width: 100%;
  padding: 8px;
  border: none;
  background: #3b82f6;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

.post {
  background: #e0f2fe;
  padding: 8px;
  border-radius: 8px;
  margin-top: 8px;
  font-size: 13px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: white;
  margin: 8% auto;
  padding: 15px;
  border-radius: 12px;
  width: 90%;
  max-width: 600px;
}

.video {
  width: 100%;
  height: 320px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<header>DIY Tutorials Hub</header>

<div class="container">

<div>

<input class="search" placeholder="Search tutorials..." oninput="render()" />

<div class="categories" id="cats"></div>

<div class="grid" id="list"></div>

</div>

<div class="panel">
<div class="stat">👁️ Watched: <span id="watched">0</span></div>

<hr>

<h4>💬 Community</h4>
<textarea id="msg"></textarea>
<button onclick="addPost()">Post</button>
<div id="posts"></div>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <iframe class="video" id="videoFrame"></iframe>
    <h3 id="mTitle"></h3>
    <p id="mDesc"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

/* ───── REAL VIDEO LINKS (YouTube embeds) ───── */
const data = [
  {id:1,title:"Fix Phone Screen",desc:"Replace cracked screen",cat:"Phone",views:120,video:"https://www.youtube.com/embed/1JINP1L2LkQ"},
  {id:2,title:"Clean Charging Port",desc:"Fix charging issues",cat:"Phone",views:80,video:"https://www.youtube.com/embed/6Q5tJ7xZ3Zk"},
  {id:3,title:"Replace Laptop Battery",desc:"Swap battery safely",cat:"Laptop",views:200,video:"https://www.youtube.com/embed/7QG2F4p8b9Q"},
  {id:4,title:"Boost WiFi Speed",desc:"Improve internet",cat:"Tech",views:150,video:"https://www.youtube.com/embed/9J7X2kQv1mA"},
  {id:5,title:"Fix Headphones",desc:"Repair audio issues",cat:"Tech",views:90,video:"https://www.youtube.com/embed/2KpX1mQv8Z0"},
  {id:6,title:"Install SSD",desc:"Upgrade storage",cat:"Laptop",views:260,video:"https://www.youtube.com/embed/8ZpQ2kJ1mX3"},
  {id:7,title:"Remove Virus",desc:"Clean your PC",cat:"Tech",views:300,video:"https://www.youtube.com/embed/3kQ9mX1pZ7A"},
  {id:8,title:"Fix Frozen Phone",desc:"Unfreeze device",cat:"Phone",views:160,video:"https://www.youtube.com/embed/5JmX9kQ2pZ1"}
];

let watched = JSON.parse(localStorage.getItem("watched")||"[]");
let current = "All";

const cats = ["All", ...new Set(data.map(d=>d.cat))];

function loadCats(){
  document.getElementById("cats").innerHTML =
    cats.map(c=>`
      <div class="cat ${c===current?'active':''}" onclick="setCat('${c}')">${c}</div>
    `).join('');
}

function setCat(c){
  current = c;
  loadCats();
  render();
}

function watch(id){
  if(!watched.includes(id)){
    watched.push(id);
    localStorage.setItem("watched",JSON.stringify(watched));
    document.getElementById("watched").innerText = watched.length;
  }
}

function openModal(item){
  document.getElementById("modal").style.display="block";
  document.getElementById("mTitle").innerText=item.title;
  document.getElementById("mDesc").innerText=item.desc;
  document.getElementById("videoFrame").src=item.video;
  watch(item.id);
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("videoFrame").src="";
}

function render(){
  const q = document.querySelector(".search").value.toLowerCase();

  const list = data.filter(d=>
    (current==="All"||d.cat===current)&&
    d.title.toLowerCase().includes(q)
  );

  document.getElementById("list").innerHTML =
    list.map(d=>`
      <div class="card" onclick='openModal(${JSON.stringify(d)})'>
        <div class="title">${d.title}</div>
        <div class="desc">${d.desc}</div>
        <div class="meta">
          <span>${d.cat}</span>
          <span>${d.views} views</span>
        </div>
      </div>
    `).join('');
}

function addPost(){
  const val = document.getElementById("msg").value;
  if(!val) return;
  const div = document.createElement("div");
  div.className="post";
  div.innerText=val;
  document.getElementById("posts").prepend(div);
  document.getElementById("msg").value="";
}

document.getElementById("watched").innerText = watched.length;

loadCats();
render();

</script>

</body>
</html>
