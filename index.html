
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DIY Tutorials Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #0f172a;
}

header {
  background: linear-gradient(90deg, #60a5fa, #93c5fd);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

.search {
  width: 100%;
  padding: 12px;
  border-radius: 20px;
  border: 1px solid #dbeafe;
  background: #f0f9ff;
  margin-bottom: 15px;
}

.categories {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.cat {
  padding: 6px 12px;
  border-radius: 20px;
  background: #e0f2fe;
  cursor: pointer;
}

.cat.active {
  background: #3b82f6;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 12px;
}

.card {
  background: #f8fbff;
  border: 1px solid #dbeafe;
  border-radius: 12px;
  padding: 12px;
  cursor: pointer;
}

.card:hover {
  background: #e0f2fe;
}

.title {
  font-weight: bold;
}

.desc {
  font-size: 13px;
  color: #475569;
}

.meta {
  font-size: 12px;
  margin-top: 8px;
  color: #64748b;
  display: flex;
  justify-content: space-between;
}

.panel {
  background: #f8fbff;
  border: 1px solid #dbeafe;
  border-radius: 12px;
  padding: 15px;
}

textarea {
  width: 100%;
  height: 70px;
  border-radius: 10px;
  border: 1px solid #dbeafe;
  padding: 10px;
}

button {
  margin-top: 8px;
  width: 100%;
  padding: 8px;
  border: none;
  background: #3b82f6;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

.post {
  background: #e0f2fe;
  padding: 8px;
  border-radius: 8px;
  margin-top: 8px;
  font-size: 13px;
}

.modal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: white;
  margin: 5% auto;
  padding: 15px;
  border-radius: 12px;
  width: 90%;
  max-width: 700px;
}

.video {
  width: 100%;
  height: 350px;
  border-radius: 10px;
  border: none;
}

.comment-box {
  margin-top: 10px;
}

.comment {
  background: #f1f5f9;
  padding: 6px;
  border-radius: 6px;
  margin-top: 5px;
  font-size: 12px;
}
</style>
</head>

<body>

<header>DIY Tutorials Hub</header>

<div class="container">

<!-- LEFT -->
<div>

<input class="search" placeholder="Search tutorials..." oninput="render()" />

<div class="categories" id="cats"></div>

<div class="grid" id="list"></div>

</div>

<!-- RIGHT -->
<div class="panel">

<h4>💬 Community Feed</h4>
<textarea id="msg" placeholder="Share your experience..."></textarea>
<button onclick="addPost()">Post Experience</button>

<div id="posts"></div>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <iframe class="video" id="videoFrame" allowfullscreen></iframe>

    <h3 id="mTitle"></h3>
    <p id="mDesc"></p>

    <h4>💬 Comments</h4>
    <textarea id="commentInput" placeholder="Write a comment..."></textarea>
    <button onclick="addComment()">Add Comment</button>

    <div id="comments"></div>

    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

/* REAL WORKING YOUTUBE VIDEOS */
const data = [
  {id:1,title:"Fix Phone Screen",desc:"Replace cracked screen",cat:"Phone",views:120,video:"https://www.youtube.com/embed/1JINP1L2LkQ"},
  {id:2,title:"Clean Charging Port",desc:"Fix charging issues",cat:"Phone",views:80,video:"https://www.youtube.com/embed/6Q5tJ7xZ3Zk"},
  {id:3,title:"Install SSD in Laptop",desc:"Upgrade storage",cat:"Laptop",views:200,video:"https://www.youtube.com/embed/7QG2F4p8b9Q"},
  {id:4,title:"Fix WiFi Speed",desc:"Boost internet",cat:"Tech",views:150,video:"https://www.youtube.com/embed/9J7X2kQv1mA"},
  {id:5,title:"Remove Virus",desc:"Clean PC safely",cat:"Tech",views:300,video:"https://www.youtube.com/embed/3kQ9mX1pZ7A"}
];

let current = "All";
let currentVideo = null;

const cats = ["All", ...new Set(data.map(d=>d.cat))];

/* STORAGE */
let watched = JSON.parse(localStorage.getItem("watched")||"[]");
let posts = JSON.parse(localStorage.getItem("posts")||"[]");
let comments = JSON.parse(localStorage.getItem("comments")||"{}");

/* CATEGORIES */
function loadCats(){
  document.getElementById("cats").innerHTML =
    cats.map(c=>`<div class="cat ${c===current?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
}

function setCat(c){
  current=c;
  loadCats();
  render();
}

/* WATCH */
function watch(id){
  if(!watched.includes(id)){
    watched.push(id);
    localStorage.setItem("watched",JSON.stringify(watched));
  }
}

/* OPEN VIDEO */
function openModal(item){
  currentVideo = item;

  document.getElementById("modal").style.display="block";
  document.getElementById("mTitle").innerText=item.title;
  document.getElementById("mDesc").innerText=item.desc;
  document.getElementById("videoFrame").src=item.video;

  watch(item.id);
  loadComments(item.id);
}

/* COMMENTS */
function addComment(){
  const val = document.getElementById("commentInput").value;
  if(!val) return;

  if(!comments[currentVideo.id]) comments[currentVideo.id]=[];

  comments[currentVideo.id].push(val);
  localStorage.setItem("comments",JSON.stringify(comments));

  document.getElementById("commentInput").value="";
  loadComments(currentVideo.id);
}

function loadComments(id){
  const box = document.getElementById("comments");
  const list = comments[id] || [];

  box.innerHTML = list.map(c=>`<div class="comment">${c}</div>`).join('');
}

/* COMMUNITY POSTS */
function addPost(){
  const val = document.getElementById("msg").value;
  if(!val) return;

  posts.unshift(val);
  localStorage.setItem("posts",JSON.stringify(posts));

  document.getElementById("msg").value="";
  renderPosts();
}

function renderPosts(){
  document.getElementById("posts").innerHTML =
    posts.map(p=>`<div class="post">${p}</div>`).join('');
}

/* MAIN LIST */
function render(){
  const q = document.querySelector(".search").value.toLowerCase();

  const list = data.filter(d=>
    (current==="All"||d.cat===current)&&
    d.title.toLowerCase().includes(q)
  );

  document.getElementById("list").innerHTML =
    list.map(d=>`
      <div class="card" onclick='openModal(${JSON.stringify(d)})'>
        <div class="title">${d.title}</div>
        <div class="desc">${d.desc}</div>
        <div class="meta">
          <span>${d.cat}</span>
          <span>${d.views} views</span>
        </div>
      </div>
    `).join('');
}

/* CLOSE */
function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("videoFrame").src="";
}

/* INIT */
loadCats();
render();
renderPosts();

</script>

</body>
</html>
