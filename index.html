<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DIY Tutorials Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #0f172a;
}

/* HEADER */
header {
  background: linear-gradient(90deg, #60a5fa, #93c5fd);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

/* LAYOUT */
.container {
  padding: 20px;
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

/* LEFT SIDE */
.search {
  width: 100%;
  padding: 12px;
  border-radius: 20px;
  border: 1px solid #dbeafe;
  background: #f0f9ff;
  margin-bottom: 15px;
}

.categories {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.cat {
  padding: 6px 12px;
  border-radius: 20px;
  background: #e0f2fe;
  cursor: pointer;
  font-size: 13px;
}

.cat.active {
  background: #3b82f6;
  color: white;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 12px;
}

/* CARD */
.card {
  background: #f8fbff;
  border: 1px solid #dbeafe;
  border-radius: 12px;
  padding: 12px;
  cursor: pointer;
  position: relative;
}

.card:hover {
  background: #e0f2fe;
}

.title {
  font-weight: bold;
  font-size: 16px;
}

.desc {
  font-size: 13px;
  color: #475569;
}

.meta {
  font-size: 12px;
  margin-top: 8px;
  color: #64748b;
  display: flex;
  justify-content: space-between;
}

/* HEART */
.heart {
  position: absolute;
  right: 10px;
  top: 8px;
  cursor: pointer;
}

/* RIGHT PANEL */
.panel {
  background: #f8fbff;
  border: 1px solid #dbeafe;
  border-radius: 12px;
  padding: 15px;
  height: fit-content;
}

.stat {
  font-size: 14px;
  margin-bottom: 10px;
}

/* COMMUNITY */
textarea {
  width: 100%;
  height: 70px;
  border-radius: 10px;
  border: 1px solid #dbeafe;
  padding: 10px;
}

button {
  margin-top: 8px;
  width: 100%;
  padding: 8px;
  border: none;
  background: #3b82f6;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

.post {
  background: #e0f2fe;
  padding: 8px;
  border-radius: 8px;
  margin-top: 8px;
  font-size: 13px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  margin: 10% auto;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 500px;
}
</style>
</head>

<body>

<header>DIY Tutorials Hub</header>

<div class="container">

<!-- LEFT SIDE -->
<div>

<input class="search" placeholder="Search tutorials..." oninput="render()" />

<div class="categories" id="cats"></div>

<div class="grid" id="list"></div>

</div>

<!-- RIGHT PANEL -->
<div class="panel">

<div class="stat">👁️ Tutorials Watched: <span id="watched">0</span></div>

<hr>

<h4>💬 Community Posts</h4>

<textarea id="msg" placeholder="Share your experience..."></textarea>
<button onclick="addPost()">Post</button>

<div id="posts"></div>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="mTitle"></h3>
    <p id="mDesc"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const data = [
  {id:1,title:"Fix Phone Screen",desc:"Replace cracked screen",cat:"Phone",views:120},
  {id:2,title:"Clean Charging Port",desc:"Fix charging issues",cat:"Phone",views:80},
  {id:3,title:"Replace Laptop Battery",desc:"Swap battery safely",cat:"Laptop",views:200},
  {id:4,title:"Boost WiFi Speed",desc:"Improve internet",cat:"Tech",views:150},
  {id:5,title:"Fix Headphones",desc:"Repair broken audio",cat:"Tech",views:90},
  {id:6,title:"Replace Keyboard Keys",desc:"Fix missing keys",cat:"Laptop",views:60},
  {id:7,title:"Remove Virus",desc:"Clean your PC",cat:"Tech",views:300},
  {id:8,title:"Fix Camera Lens",desc:"Repair blurry camera",cat:"Phone",views:110},
  {id:9,title:"Replace Laptop Screen",desc:"Full screen swap",cat:"Laptop",views:220},
  {id:10,title:"Speed Up Phone",desc:"Make phone faster",cat:"Phone",views:180}
];
const data = [
  {id:1,title:"Fix Phone Screen",desc:"Replace cracked screen",cat:"Phone",views:120},
  {id:2,title:"Clean Charging Port",desc:"Fix charging issues",cat:"Phone",views:80},
  {id:3,title:"Replace Laptop Battery",desc:"Swap battery safely",cat:"Laptop",views:200},
  {id:4,title:"Boost WiFi Speed",desc:"Improve internet",cat:"Tech",views:150},
  {id:5,title:"Fix Headphones",desc:"Repair broken audio",cat:"Tech",views:90},
  {id:6,title:"Replace Keyboard Keys",desc:"Fix missing keys",cat:"Laptop",views:60},
  {id:7,title:"Remove Virus",desc:"Clean your PC",cat:"Tech",views:300},
  {id:8,title:"Fix Camera Lens",desc:"Repair blurry camera",cat:"Phone",views:110},
  {id:9,title:"Replace Laptop Screen",desc:"Full screen swap",cat:"Laptop",views:220},
  {id:10,title:"Speed Up Phone",desc:"Make phone faster",cat:"Phone",views:180},

  // ───── 15 NEW TUTORIALS ─────
  {id:11,title:"Fix Overheating Phone",desc:"Stop your phone from heating up",cat:"Phone",views:140},
  {id:12,title:"Replace Broken Charger Cable",desc:"Repair or replace damaged cables",cat:"Phone",views:95},
  {id:13,title:"Install SSD in Laptop",desc:"Upgrade to faster storage",cat:"Laptop",views:260},
  {id:14,title:"Fix Blue Screen Error",desc:"Solve Windows crash issues",cat:"Tech",views:310},
  {id:15,title:"Clean Laptop Fans",desc:"Remove dust and improve cooling",cat:"Laptop",views:175},
  {id:16,title:"Recover Deleted Files",desc:"Restore lost data easily",cat:"Tech",views:240},
  {id:17,title:"Fix Weak WiFi Signal",desc:"Improve router range",cat:"Tech",views:130},
  {id:18,title:"Replace Phone Battery",desc:"Install a new battery safely",cat:"Phone",views:210},
  {id:19,title:"Fix Frozen Screen",desc:"Unfreeze unresponsive devices",cat:"Phone",views:160},
  {id:20,title:"Upgrade RAM in Laptop",desc:"Boost performance with more memory",cat:"Laptop",views:275},
  {id:21,title:"Fix Audio Jack",desc:"Repair headphone port issues",cat:"Phone",views:85},
  {id:22,title:"Reset Forgotten Password",desc:"Recover access to your device",cat:"Tech",views:190},
  {id:23,title:"Fix Slow Boot Time",desc:"Speed up startup process",cat:"Laptop",views:220},
  {id:24,title:"Repair Broken Screen Hinges",desc:"Fix laptop hinge damage",cat:"Laptop",views:140},
  {id:25,title:"Clear Cache for Speed",desc:"Improve device performance quickly",cat:"Tech",views:170}
];
let watched = JSON.parse(localStorage.getItem("watched")||"[]");

const cats = ["All", ...new Set(data.map(d=>d.cat))];
let current = "All";

function loadCats(){
  document.getElementById("cats").innerHTML =
    cats.map(c=>`<div class="cat ${c===current?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
}

function setCat(c){
  current = c;
  loadCats();
  render();
}

function watch(id){
  if(!watched.includes(id)){
    watched.push(id);
    localStorage.setItem("watched",JSON.stringify(watched));
    document.getElementById("watched").innerText = watched.length;
  }
}

function openModal(t,d,id){
  document.getElementById("modal").style.display="block";
  document.getElementById("mTitle").innerText=t;
  document.getElementById("mDesc").innerText=d;
  watch(id);
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function render(){
  const q = document.querySelector(".search").value.toLowerCase();

  const list = data.filter(d=>
    (current==="All"||d.cat===current)&&
    d.title.toLowerCase().includes(q)
  );

  document.getElementById("list").innerHTML =
    list.map(d=>`
      <div class="card">
        <div class="heart">🤍</div>
        <div onclick="openModal('${d.title}','${d.desc}',${d.id})">
          <div class="title">${d.title}</div>
          <div class="desc">${d.desc}</div>
          <div class="meta"><span>${d.cat}</span><span>${d.views} views</span></div>
        </div>
      </div>
    `).join('');
}

/* COMMUNITY */
function addPost(){
  const val = document.getElementById("msg").value;
  if(!val) return;

  const div = document.createElement("div");
  div.className="post";
  div.innerText = val;

  document.getElementById("posts").prepend(div);
  document.getElementById("msg").value="";
}

document.getElementById("watched").innerText = watched.length;

loadCats();
render();
</script>

</body>
</html>
