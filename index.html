<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DIY Tutorials</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #0f172a;
}

header {
  background: #60a5fa;
  color: white;
  padding: 18px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

/* Search */
.search {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #dbeafe;
  background: #f0f9ff;
  margin-bottom: 15px;
}

/* Categories */
.categories {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.cat {
  padding: 6px 12px;
  border-radius: 20px;
  background: #e0f2fe;
  cursor: pointer;
  font-size: 13px;
}

.cat.active {
  background: #3b82f6;
  color: white;
}

/* Cards */
.card {
  background: #f8fbff;
  border: 1px solid #dbeafe;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  background: #e0f2fe;
}

.title {
  font-size: 18px;
  font-weight: bold;
}

.desc {
  font-size: 14px;
  color: #475569;
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  margin: 10% auto;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 500px;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 18px;
}

.video {
  height: 180px;
  background: #e0f2fe;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<header>DIY Tutorials</header>

<div class="container">

<input class="search" placeholder="Search tutorials..." onkeyup="render()" />

<div class="categories">
  <div class="cat active" onclick="setCategory('All', this)">All</div>
  <div class="cat" onclick="setCategory('Phone', this)">Phone</div>
  <div class="cat" onclick="setCategory('Laptop', this)">Laptop</div>
</div>

<div id="list"></div>

</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <div class="video">▶ Video Placeholder</div>
    <h2 id="modalTitle"></h2>
    <p id="modalDesc"></p>
  </div>
</div>

<script>
const data = [
  { title: "Fix Phone Screen", desc: "Replace a cracked screen easily.", cat: "Phone" },
  { title: "Clean Charging Port", desc: "Fix charging issues quickly.", cat: "Phone" },
  { title: "Replace Laptop Battery", desc: "Swap your battery safely.", cat: "Laptop" }
];

let currentCategory = "All";

function render() {
  const list = document.getElementById("list");
  const search = document.querySelector(".search").value.toLowerCase();

  list.innerHTML = "";

  data.forEach(item => {
    if (
      (currentCategory === "All" || item.cat === currentCategory) &&
      item.title.toLowerCase().includes(search)
    ) {
      list.innerHTML += `
        <div class="card" onclick="openModal('${item.title}', '${item.desc}')">
          <div class="title">${item.title}</div>
          <div class="desc">${item.desc}</div>
        </div>
      `;
    }
  });
}

function setCategory(cat, el) {
  currentCategory = cat;

  document.querySelectorAll(".cat").forEach(c => c.classList.remove("active"));
  el.classList.add("active");

  render();
}

function openModal(title, desc) {
  document.getElementById("modal").style.display = "block";
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalDesc").innerText = desc;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

render();
</script>

</body>
</html>
