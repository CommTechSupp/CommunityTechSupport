<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DIY Tutorials</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #0f172a;
}

/* HEADER */
header {
  background: linear-gradient(90deg, #60a5fa, #93c5fd);
  color: white;
  padding: 22px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}

/* SEARCH */
.container {
  padding: 20px;
}

.search {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: 1px solid #dbeafe;
  background: #f0f9ff;
  margin-bottom: 15px;
  outline: none;
}

/* CATEGORIES */
.categories {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  overflow-x: auto;
}

.cat {
  padding: 8px 14px;
  border-radius: 20px;
  background: #e0f2fe;
  cursor: pointer;
  font-size: 13px;
  white-space: nowrap;
  transition: 0.2s;
}

.cat.active {
  background: #3b82f6;
  color: white;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: #f8fbff;
  border: 1px solid #dbeafe;
  border-radius: 14px;
  padding: 15px;
  cursor: pointer;
  position: relative;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
  background: #e0f2fe;
}

.title {
  font-size: 17px;
  font-weight: bold;
}

.desc {
  font-size: 13px;
  color: #475569;
  margin-top: 5px;
}

/* HEART */
.heart {
  position: absolute;
  top: 10px;
  right: 10px;
  cursor: pointer;
  font-size: 18px;
}

/* META */
.meta {
  margin-top: 10px;
  font-size: 12px;
  color: #64748b;
  display: flex;
  justify-content: space-between;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  margin: 8% auto;
  padding: 20px;
  border-radius: 14px;
  width: 90%;
  max-width: 520px;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 18px;
}

.video {
  height: 180px;
  background: #e0f2fe;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<header>DIY Tutorials</header>

<div class="container">

<input class="search" placeholder="Search tutorials..." oninput="render()" />

<div class="categories" id="cats"></div>

<div class="grid" id="list"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <div class="video">▶ Video Placeholder</div>
    <h2 id="mTitle"></h2>
    <p id="mDesc"></p>
  </div>
</div>

<script>
const data = [
  { id: 1, title: "Fix Phone Screen", desc: "Replace cracked screen easily.", cat: "Phone", views: 120 },
  { id: 2, title: "Clean Charging Port", desc: "Fix charging issues fast.", cat: "Phone", views: 80 },
  { id: 3, title: "Replace Laptop Battery", desc: "Swap battery safely.", cat: "Laptop", views: 200 },
  { id: 4, title: "Boost WiFi Speed", desc: "Improve your internet instantly.", cat: "Tech", views: 150 }
];

let favs = new Set();
let currentCat = "All";

const cats = ["All", ...new Set(data.map(d => d.cat))];

function loadCats() {
  const el = document.getElementById("cats");
  el.innerHTML = cats.map(c =>
    `<div class="cat ${c===currentCat?'active':''}" onclick="setCat('${c}')">${c}</div>`
  ).join('');
}

function setCat(c) {
  currentCat = c;
  loadCats();
  render();
}

function toggleFav(id) {
  favs.has(id) ? favs.delete(id) : favs.add(id);
  render();
}

function openModal(t,d) {
  document.getElementById("modal").style.display = "block";
  document.getElementById("mTitle").innerText = t;
  document.getElementById("mDesc").innerText = d;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function render() {
  const q = document.querySelector(".search").value.toLowerCase();
  const list = document.getElementById("list");

  const filtered = data.filter(d =>
    (currentCat==="All" || d.cat===currentCat) &&
    d.title.toLowerCase().includes(q)
  );

  list.innerHTML = filtered.map(d => `
    <div class="card">
      <div class="heart" onclick="toggleFav(${d.id})">
        ${favs.has(d.id) ? "❤️" : "🤍"}
      </div>

      <div onclick="openModal('${d.title}','${d.desc}')">
        <div class="title">${d.title}</div>
        <div class="desc">${d.desc}</div>

        <div class="meta">
          <span>${d.cat}</span>
          <span>${d.views} views</span>
        </div>
      </div>
    </div>
  `).join('');
}

loadCats();
render();
</script>

</body>
</html>
