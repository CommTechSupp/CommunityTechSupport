<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Repair Shops</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap');

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --bg:#FFFFFF;
  --surface:#F7F9FC;
  --surface2:#EEF4FF;
  --border:#D6E4FF;

  --accent:#2563EB;
  --accent2:#3B82F6;
  --gold:#2563EB;
  --teal:#1D4ED8;

  --text:#0F172A;
  --muted:#64748B;
  --tag:#EAF2FF;
}

body{
  background:var(--bg);
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:20px;
}

.ti{
  color:var(--accent);
}

.phone{
  width:380px;
  min-height:640px;
  background:#fff;
  overflow:hidden;
  position:relative;
  border-radius:30px;
  border:1px solid var(--border);
  box-shadow:0 10px 35px rgba(37,99,235,.08);
}

.status-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px 4px;
  font-size:12px;
  color:var(--muted);
}

.status-time{
  font-weight:600;
  font-size:13px;
  color:var(--text);
}

.header{
  padding:12px 20px 8px;
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:12px;
}

.greeting{
  font-size:11px;
  color:var(--muted);
  letter-spacing:.05em;
  text-transform:uppercase;
}

.title{
  font-family:'Syne',sans-serif;
  font-size:24px;
  font-weight:700;
  color:var(--text);
  line-height:1.1;
}

.loc-badge{
  display:flex;
  align-items:center;
  gap:5px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:20px;
  padding:5px 10px;
  font-size:11px;
  color:var(--accent);
}

.avatar{
  width:36px;
  height:36px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:600;
  color:#fff;
}

.search-wrap{
  padding:0 20px 10px;
}

.search-box{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px 14px;
}

.search-box input{
  background:none;
  border:none;
  outline:none;
  color:var(--text);
  font-size:14px;
  flex:1;
  font-family:'DM Sans',sans-serif;
}

.search-box input::placeholder{
  color:var(--muted);
}

.filter-btn{
  background:var(--accent);
  border:none;
  border-radius:10px;
  width:32px;
  height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
}

.filter-btn .ti{
  color:#fff;
}

.sort-row,
.filter-row{
  display:flex;
  gap:8px;
  overflow-x:auto;
  scrollbar-width:none;
}

.sort-row{
  padding:4px 20px 10px;
}

.filter-row{
  padding:0 20px 12px;
}

.sort-row::-webkit-scrollbar,
.filter-row::-webkit-scrollbar{
  display:none;
}

.chip,
.ftag{
  white-space:nowrap;
  border-radius:20px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--muted);
  cursor:pointer;
  transition:all .2s;
  font-family:'DM Sans',sans-serif;
}

.chip{
  font-size:12px;
  padding:6px 14px;
}

.ftag{
  font-size:11px;
  padding:5px 12px;
}

.chip.active{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
  font-weight:500;
}

.ftag.on{
  background:rgba(37,99,235,.12);
  border-color:var(--accent);
  color:var(--accent);
}

.section-label{
  padding:0 20px 8px;
  font-size:11px;
  color:var(--muted);
  letter-spacing:.08em;
  text-transform:uppercase;
}

.list{
  padding:0 16px;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-bottom:100px;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px 16px;
  cursor:pointer;
  transition:transform .15s,border-color .15s;
  position:relative;
  overflow:hidden;
}

.card:active{
  transform:scale(.98);
}

.card.top{
  border-color:rgba(37,99,235,.35);
}

.card::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:2px;
  background:transparent;
}

.card.top::before{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}

.card-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:8px;
}

.store-name{
  font-size:15px;
  font-weight:600;
  color:var(--text);
}

.store-name a{
  color:var(--text);
  text-decoration:none;
}

.store-name a:hover{
  color:var(--accent);
}

.badges{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:4px;
  margin-left:8px;
}

.badge-top{
  font-size:9px;
  font-weight:600;
  letter-spacing:.06em;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
  padding:3px 8px;
  border-radius:10px;
  text-transform:uppercase;
}

.badge-open{
  font-size:10px;
  padding:3px 9px;
  border-radius:10px;
  font-weight:500;
}

.badge-open.open{
  background:rgba(37,99,235,.10);
  color:var(--accent);
}

.badge-open.closed{
  background:rgba(148,163,184,.15);
  color:#64748B;
}

.stars-row{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:6px;
}

.stars{
  display:flex;
  gap:1px;
}

.star{
  font-size:13px;
}

.star.full{
  color:var(--accent);
}

.star.half{
  color:var(--accent);
  opacity:.5;
}

.star.empty{
  color:var(--border);
}

.rating-num{
  font-size:13px;
  font-weight:600;
  color:var(--accent);
}

.review-count{
  font-size:11px;
  color:var(--muted);
}

.addr-row{
  display:flex;
  align-items:center;
  gap:5px;
  margin-bottom:8px;
}

.addr-text{
  font-size:11px;
  color:var(--muted);
}

.dist-badge{
  font-size:10px;
  color:var(--accent);
  background:rgba(37,99,235,.10);
  padding:2px 8px;
  border-radius:8px;
  margin-left:auto;
}

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
}

.tag{
  font-size:10px;
  padding:3px 9px;
  border-radius:8px;
  background:var(--tag);
  color:var(--accent);
  border:1px solid var(--border);
}

.detail-overlay{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.55);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index:100;
}

.detail-sheet{
  background:#fff;
  border-radius:24px 24px 0 0;
  padding:20px;
  width:380px;
  max-height:85vh;
  overflow-y:auto;
}

.drag-handle{
  width:36px;
  height:4px;
  background:var(--border);
  border-radius:2px;
  margin:0 auto 16px;
}

.detail-close{
  position:absolute;
  top:20px;
  right:20px;
  background:var(--surface2);
  border:none;
  border-radius:50%;
  width:30px;
  height:30px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.detail-title{
  font-family:'Syne',sans-serif;
  font-size:20px;
  font-weight:700;
  margin-bottom:4px;
}

.detail-addr{
  font-size:12px;
  color:var(--muted);
  margin-bottom:14px;
}

.detail-stars{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:16px;
}

.big-rating{
  font-size:36px;
  font-weight:700;
  color:var(--accent);
  font-family:'Syne',sans-serif;
}

.rating-bars{
  flex:1;
}

.bar-row{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:3px;
}

.bar-label{
  font-size:10px;
  color:var(--muted);
  width:8px;
}

.bar-track{
  flex:1;
  height:4px;
  background:var(--border);
  border-radius:2px;
  overflow:hidden;
}

.bar-fill{
  height:100%;
  background:var(--accent);
}

.action-row{
  display:flex;
  gap:10px;
  margin-bottom:18px;
}

.act-btn{
  flex:1;
  padding:12px;
  border-radius:14px;
  border:none;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.act-btn.primary{
  background:var(--accent);
  color:#fff;
}

.act-btn.primary .ti{
  color:#fff;
}

.act-btn.secondary{
  background:var(--surface2);
  color:var(--accent);
  border:1px solid var(--border);
}

.services-title,
.reviews-title{
  font-size:12px;
  color:var(--muted);
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:.06em;
}

.services-list{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:18px;
}

.svc-tag{
  font-size:12px;
  padding:6px 12px;
  border-radius:10px;
  background:rgba(37,99,235,.10);
  color:var(--accent);
  border:1px solid rgba(37,99,235,.2);
}

.review-card{
  background:var(--surface);
  border-radius:12px;
  padding:12px;
  margin-bottom:8px;
}

.rev-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}

.rev-author{
  font-size:13px;
  font-weight:500;
}

.rev-text{
  font-size:12px;
  color:var(--muted);
  line-height:1.5;
}

.empty-state{
  text-align:center;
  padding:48px 24px;
  color:var(--muted);
}

.empty-title{
  font-size:16px;
  font-weight:600;
  color:var(--text);
  margin-bottom:6px;
}

.skeleton{
  background:var(--surface);
  border-radius:18px;
  padding:14px 16px;
  margin:0 16px 10px;
}

.sk-line{
  background:var(--surface2);
  border-radius:4px;
  height:12px;
  margin-bottom:8px;
  animation:shimmer 1.4s infinite;
}

.sk-line.short{width:60%;}
.sk-line.mid{width:80%;}

@keyframes shimmer{
  0%,100%{opacity:.4}
  50%{opacity:.8}
}

.navbar{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:380px;
  background:#fff;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-around;
  padding:10px 0 20px;
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  font-size:9px;
  color:var(--muted);
  cursor:pointer;
}

.nav-item.active{
  color:var(--accent);
}

.nav-dot{
  width:4px;
  height:4px;
  border-radius:50%;
  background:var(--accent);
  opacity:0;
}

.nav-item.active .nav-dot{
  opacity:1;
}
</style>
</head>

<body>

<div class="phone" id="app">

  <div class="status-bar">
    <span class="status-time">9:41</span>

    <div style="display:flex;gap:4px;align-items:center;">
      <i class="ti ti-wifi" style="font-size:12px"></i>
      <i class="ti ti-battery-2" style="font-size:12px"></i>
    </div>
  </div>

  <div class="header">
    <div class="header-top">

      <div>
        <div class="greeting">Near you · NYC</div>
        <div class="title">Repair<br>Shops</div>
      </div>

      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
        <div class="avatar">AJ</div>

        <div class="loc-badge">
          <i class="ti ti-map-pin" style="font-size:11px"></i>
          Lower Manhattan
        </div>
      </div>

    </div>
  </div>

  <div class="search-wrap">
    <div class="search-box">

      <i class="ti ti-search" style="font-size:16px"></i>

      <input
        type="text"
        placeholder="Store name or service…"
        id="searchInput"
        oninput="filterStores()"
      >

      <button class="filter-btn" aria-label="Filters">
        <i class="ti ti-adjustments-horizontal" style="font-size:14px"></i>
      </button>

    </div>
  </div>

  <div class="sort-row">
    <button class="chip active" onclick="setSort('rating',this)">⭐ Top Rated</button>
    <button class="chip" onclick="setSort('distance',this)">📍 Nearest</button>
    <button class="chip" onclick="setSort('reviews',this)">💬 Most Reviewed</button>
  </div>

  <div class="filter-row">
    <button class="ftag on" onclick="toggleFilter('all',this)">All</button>
    <button class="ftag" onclick="toggleFilter('Phone',this)">Phone</button>
    <button class="ftag" onclick="toggleFilter('Laptop',this)">Laptop</button>
    <button class="ftag" onclick="toggleFilter('Tablet',this)">Tablet</button>
    <button class="ftag" onclick="toggleFilter('open',this)">Open Now</button>
  </div>

  <div id="loading">
    <div class="skeleton"><div class="sk-line mid"></div><div class="sk-line short"></div><div class="sk-line"></div></div>
    <div class="skeleton"><div class="sk-line"></div><div class="sk-line short"></div><div class="sk-line mid"></div></div>
  </div>

  <div id="storeList" style="display:none">
    <div class="section-label" id="resultCount"></div>
    <div class="list" id="cardsContainer"></div>
  </div>

  <div id="emptyState" class="empty-state" style="display:none">
    <div style="font-size:40px;margin-bottom:12px;">🔍</div>
    <div class="empty-title">No shops found</div>
    <p style="font-size:13px">Try adjusting your search or filters.</p>
  </div>

  <div class="navbar">
    <div class="nav-item">
      <i class="ti ti-home" style="font-size:20px"></i>
      <span>Home</span>
      <div class="nav-dot"></div>
    </div>

    <div class="nav-item active">
      <i class="ti ti-map" style="font-size:20px"></i>
      <span>Shops</span>
      <div class="nav-dot"></div>
    </div>

    <div class="nav-item">
      <i class="ti ti-tool" style="font-size:20px"></i>
      <span>Repair</span>
      <div class="nav-dot"></div>
    </div>

    <div class="nav-item">
      <i class="ti ti-user" style="font-size:20px"></i>
      <span>Profile</span>
      <div class="nav-dot"></div>
    </div>
  </div>

</div>

<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-sheet" id="detailSheet">
    <div class="drag-handle"></div>

    <button class="detail-close" onclick="closeDetail()">
      <i class="ti ti-x" style="font-size:14px"></i>
    </button>

    <div id="detailContent"></div>
  </div>
</div>

<script>
const stores = [
  {
    id:1,
    name:"uBreakiFix by Asurion",
    topRated:true,
    open:true,
    rating:4.8,
    reviews:1247,
    distance:0.3,
    address:"100 William St, New York, NY 10038",
    website:"https://www.ubreakifix.com/",
    services:["Phone Repair","Laptop Repair","Screen Replacement","Battery"],
    ratingBreakdown:[60,25,10,3,2],
    clientReviews:[
      {author:"Sarah M.",stars:5,text:"Screen replaced in 45 mins, good as new!"},
      {author:"James K.",stars:5,text:"Fair pricing, very professional staff."}
    ]
  },
  {
    id:2,
    name:"CPR Cell Phone Repair NYC",
    topRated:true,
    open:true,
    rating:4.7,
    reviews:892,
    distance:0.6,
    address:"217 Broadway, New York, NY 10007",
    website:"https://www.cellphonerepair.com/",
    services:["Phone Repair","Tablet Repair","Water Damage"],
    ratingBreakdown:[55,28,12,3,2],
    clientReviews:[
      {author:"Marcus T.",stars:5,text:"Saved my water-damaged iPhone!"},
      {author:"Priya N.",stars:4,text:"Fast turnaround and fair prices."}
    ]
  }
];

let currentSort='rating';
let activeFilters=new Set(['all']);

function stars(r){
  let s='';
  for(let i=1;i<=5;i++){
    if(i<=Math.floor(r)) s+='<span class="star full">★</span>';
    else if(i-r<1&&i-r>0) s+='<span class="star half">★</span>';
    else s+='<span class="star empty">★</span>';
  }
  return s;
}

function renderCard(store){
  const div=document.createElement('div');

  div.className='card'+(store.topRated?' top':'');
  div.onclick=()=>openDetail(store);

  div.innerHTML=`
    <div class="card-head">
      <div class="store-name">
        <a href="${store.website}" target="_blank" onclick="event.stopPropagation()">
          ${store.name}
        </a>
      </div>

      <div class="badges">
        ${store.topRated?'<span class="badge-top">Top Rated</span>':''}
        <span class="badge-open ${store.open?'open':'closed'}">
          ${store.open?'Open':'Closed'}
        </span>
      </div>
    </div>

    <div class="stars-row">
      <div class="stars">${stars(store.rating)}</div>
      <span class="rating-num">${store.rating}</span>
      <span class="review-count">(${store.reviews.toLocaleString()} reviews)</span>
    </div>

    <div class="addr-row">
      <i class="ti ti-map-pin" style="font-size:11px"></i>
      <span class="addr-text">${store.address}</span>
      <span class="dist-badge">${store.distance} mi</span>
    </div>

    <div class="tags">
      ${store.services.map(s=>`<span class="tag">${s}</span>`).join('')}
    </div>
  `;

  return div;
}

function renderList(list){
  const c=document.getElementById('cardsContainer');

  c.innerHTML='';

  document.getElementById('resultCount').textContent=
    `${list.length} shop${list.length!==1?'s':''} found`;

  if(list.length===0){
    document.getElementById('storeList').style.display='none';
    document.getElementById('emptyState').style.display='block';
    return;
  }

  document.getElementById('storeList').style.display='block';
  document.getElementById('emptyState').style.display='none';

  list.forEach(store=>{
    c.appendChild(renderCard(store));
  });
}

function getFiltered(){
  const q=document.getElementById('searchInput').value.toLowerCase();

  let list=[...stores];

  if(!activeFilters.has('all')){
    list=list.filter(s=>{
      if(activeFilters.has('open')&&!s.open) return false;

      const devFilters=[...activeFilters].filter(f=>f!=='open');

      if(
        devFilters.length &&
        !devFilters.some(f=>
          s.services.some(sv=>sv.toLowerCase().includes(f.toLowerCase()))
        )
      ) return false;

      return true;
    });
  }

  if(q){
    list=list.filter(s=>
      s.name.toLowerCase().includes(q) ||
      s.services.some(sv=>sv.toLowerCase().includes(q))
    );
  }

  if(currentSort==='rating'){
    list.sort((a,b)=>b.rating-a.rating);
  }
  else if(currentSort==='distance'){
    list.sort((a,b)=>a.distance-b.distance);
  }
  else{
    list.sort((a,b)=>b.reviews-a.reviews);
  }

  return list;
}

function filterStores(){
  renderList(getFiltered());
}

function setSort(type,el){
  currentSort=type;

  document.querySelectorAll('.chip')
    .forEach(c=>c.classList.remove('active'));

  el.classList.add('active');

  filterStores();
}

function toggleFilter(val,el){

  if(val==='all'){
    activeFilters=new Set(['all']);

    document.querySelectorAll('.ftag')
      .forEach(f=>f.classList.remove('on'));

    el.classList.add('on');
  }
  else{

    activeFilters.delete('all');

    document.querySelector('.ftag')
      .classList.remove('on');

    if(activeFilters.has(val)){
      activeFilters.delete(val);
      el.classList.remove('on');
    }
    else{
      activeFilters.add(val);
      el.classList.add('on');
    }

    if(activeFilters.size===0){
      activeFilters.add('all');
      document.querySelector('.ftag').classList.add('on');
    }
  }

  filterStores();
}

function openDetail(store){

  const barsHTML=[5,4,3,2,1].map((n,i)=>`
    <div class="bar-row">
      <span class="bar-label">${n}</span>

      <div class="bar-track">
        <div class="bar-fill" style="width:${store.ratingBreakdown[i]}%"></div>
      </div>

      <span style="font-size:10px;color:var(--muted);width:28px;text-align:right">
        ${store.ratingBreakdown[i]}%
      </span>
    </div>
  `).join('');

  const revsHTML=store.clientReviews.map(r=>`
    <div class="review-card">
      <div class="rev-head">
        <span class="rev-author">${r.author}</span>
        <div>${stars(r.stars)}</div>
      </div>

      <p class="rev-text">${r.text}</p>
    </div>
  `).join('');

  document.getElementById('detailContent').innerHTML=`
    <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:4px;">

      <div style="flex:1">
        <div class="detail-title">${store.name}</div>

        <div class="detail-addr">
          <i class="ti ti-map-pin" style="font-size:11px"></i>
          ${store.address}
        </div>
      </div>

      <span class="badge-open ${store.open?'open':'closed'}">
        ${store.open?'Open Now':'Closed'}
      </span>
    </div>

    <div class="detail-stars">
      <div class="big-rating">${store.rating}</div>

      <div class="rating-bars">
        ${barsHTML}
      </div>
    </div>

    <div class="action-row">

      <button class="act-btn primary">
        <i class="ti ti-map-2"></i>
        Directions
      </button>

      <button class="act-btn secondary">
        <i class="ti ti-phone"></i>
        Call
      </button>

    </div>

    <div class="services-title">Services</div>

    <div class="services-list">
      ${store.services.map(s=>`<span class="svc-tag">${s}</span>`).join('')}
    </div>

    <div class="reviews-title">
      Customer Reviews (${store.reviews.toLocaleString()})
    </div>

    ${revsHTML}
  `;

  const overlay=document.getElementById('detailOverlay');

  overlay.style.display='flex';
}

function closeDetail(e){
  if(
    e &&
    e.target!==document.getElementById('detailOverlay') &&
    !e.target.classList.contains('detail-close')
  ) return;

  document.getElementById('detailOverlay').style.display='none';
}

setTimeout(()=>{
  document.getElementById('loading').style.display='none';
  renderList(getFiltered());
},1200);
</script>

</body>
</html>
