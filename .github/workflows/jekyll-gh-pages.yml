content: |
  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      :root{
      --bg:#0F1117;--surface:#1A1D27;--surfaceAlt:#22263A;--border:#2C3050;
      --accent:#F97316;--accentSoft:#FED7AA;--text:#F1F5F9;--textSub:#94A3B8;
      --muted:#475569;--success:#22C55E;--warning:#F59E0B;--error:#EF4444;--star:#FBBF24;
      }
      .wrap{display:flex;justify-content:center;padding:16px 0 8px}
      .phone{width:375px;height:780px;background:var(--bg);border-radius:44px;border:6px solid #1e1e2e;overflow:hidden;display:flex;flex-direction:column;position:relative;box-shadow:0 0 0 1px #333}
      .sbar{background:#0a0c13;padding:10px 20px 6px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
      .sbar-t{font-size:12px;color:#fff;font-weight:500}
      .hdr{background:var(--surface);padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
      .hdr-title{font-size:18px;font-weight:700;color:var(--text)}
      .scr{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--bg);scrollbar-width:none}
      .scr::-webkit-scrollbar{display:none}
      .tabbar{background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0 14px;flex-shrink:0}
      .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:opacity .15s}
      .tab svg{width:22px;height:22px;fill:none;stroke:var(--muted);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}
      .tab.on svg{stroke:var(--accent)}
      .tab-lbl{font-size:10px;font-weight:600;color:var(--muted);transition:color .15s}
      .tab.on .tab-lbl{color:var(--accent)}
      .pad{padding:14px}
      .greeting{font-size:22px;font-weight:900;color:var(--text)}
      .subgreet{font-size:13px;color:var(--textSub);margin-top:2px}
      .avatar-circle{width:42px;height:42px;border-radius:50%;background:#F9731622;display:flex;align-items:center;justify-content:center;flex-shrink:0}
      .pill-row{display:flex;gap:8px;overflow-x:auto;margin:12px -14px;padding:0 14px 4px;scrollbar-width:none}
      .pill-row::-webkit-scrollbar{display:none}
      .pill{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:7px 13px;font-size:12px;color:var(--text);white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:5px;flex-shrink:0}
      .pill svg{width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
      .sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
      .sec-title{font-size:16px;font-weight:700;color:var(--text)}
      .see-all{font-size:12px;font-weight:600;color:var(--accent);cursor:pointer}
      .hscroll{display:flex;gap:12px;overflow-x:auto;margin:0 -14px;padding:0 14px 4px;scrollbar-width:none}
      .hscroll::-webkit-scrollbar{display:none}
      .tcard-h{width:200px;background:var(--surface);border-radius:12px;overflow:hidden;cursor:pointer;flex-shrink:0;border:1px solid var(--border)}
      .tcard-h-body{padding:8px}
      .tcard-h-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px;line-height:1.4}
      .tcard-h-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--textSub)}
      .star-row{display:flex;align-items:center;gap:3px;color:var(--star);font-size:11px;font-weight:600}
      .badge{display:inline-flex;align-items:center;background:#F9731622;color:var(--accent);font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px}
      .badge-gray{background:#ffffff12;color:var(--textSub)}
      .tech-row{background:var(--surface);border-radius:12px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:10px;cursor:pointer;border:1px solid var(--border)}
      .tech-av{width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0}
      .tech-name{font-size:13px;font-weight:700;color:var(--text)}
      .tech-spec{font-size:11px;color:var(--textSub);margin-top:1px}
      .tech-rate{font-size:13px;font-weight:700;color:var(--accent)}
      .tech-dist{font-size:11px;color:var(--muted)}
      .status-dot{display:flex;align-items:center;gap:4px;margin-top:3px}
      .dot{width:7px;height:7px;border-radius:50%}
      .dot-avail{background:var(--success)}
      .dot-busy{background:var(--warning)}
      .dot-un{background:var(--error)}
      .dot-lbl{font-size:11px;font-weight:500}
      .recent-row{background:var(--surface);border-radius:12px;padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer;border:1px solid var(--border)}
      .recent-thumb{width:72px;height:50px;border-radius:8px;object-fit:cover;flex-shrink:0}
      .recent-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.3}
      .sec{margin-bottom:18px}
      .tcard-v{background:var(--surface);border-radius:14px;overflow:hidden;margin-bottom:12px;cursor:pointer;border:1px solid var(--border)}
      .tcard-v img{width:100%;height:180px;object-fit:cover;display:block}
      .tcard-v-body{padding:12px}
      .tcard-v-title{font-size:15px;font-weight:700;color:var(--text);margin:6px 0 5px;line-height:1.3}
      .tcard-v-desc{font-size:12px;color:var(--textSub);line-height:1.6;margin-bottom:8px}
      .tcard-v-footer{display:flex;align-items:center;gap:10px}
      .author{font-size:11px;color:var(--textSub);flex:1}
      .views{font-size:11px;color:var(--muted)}
      .play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
      .play-btn{width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center}
      .searchbar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:9px 14px;margin-bottom:10px}
      .searchbar input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13px}
      .searchbar input::placeholder{color:var(--muted)}
      .filter-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;scrollbar-width:none}
      .filter-row::-webkit-scrollbar{display:none}
      .ftab{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:6px 14px;font-size:12px;color:var(--textSub);cursor:pointer;white-space:nowrap;font-weight:500}
      .ftab.on{background:var(--accent);border-color:var(--accent);color:#fff}
      .tech-card{background:var(--surface);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid var(--border);cursor:pointer}
      .tc-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
      .tc-info{flex:1}
      .tc-rate{font-size:22px;font-weight:900;color:var(--accent);line-height:1}
      .tc-rate-lbl{font-size:11px;color:var(--textSub)}
      .skills-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
      .tc-footer{display:flex;align-items:center;gap:6px;border-top:1px solid var(--border);padding-top:8px}
      .tc-avail{font-size:11px;color:var(--textSub);flex:1}
      .profile-card{background:var(--surface);border-radius:14px;padding:14px;border:1px solid var(--border)}
      .field{margin-bottom:12px}
      .field label{font-size:12px;font-weight:600;color:var(--textSub);display:block;margin-bottom:5px}
      .field input,.field textarea{width:100%;background:var(--surfaceAlt);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;outline:none;font-family:inherit;resize:none}
      .rate-row-in{display:flex;align-items:center;gap:5px}
      .dollar{font-size:22px;font-weight:900;color:var(--accent)}
      .rate-input{width:70px;font-size:26px;font-weight:900;text-align:center;background:var(--surfaceAlt);border:1px solid var(--border);border-radius:8px;padding:4px 8px;color:var(--text);outline:none}
      .per-hr{font-size:15px;color:var(--textSub)}
      .save-btn{width:100%;background:var(--accent);border:none;border-radius:12px;padding:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;font-family:inherit}
      .save-btn.saved{background:var(--success)}
      .divider{height:1px;background:var(--border);margin:16px 0}
      .shop-card{background:var(--surface);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;border:1px solid var(--border)}
      .shop-icon{width:44px;height:44px;border-radius:10px;background:#F9731618;display:flex;align-items:center;justify-content:center;flex-shrink:0}
      .shop-name{font-size:13px;font-weight:700;color:var(--text)}
      .shop-spec{font-size:11px;color:var(--textSub);margin-top:1px}
      .shop-hrs{font-size:11px;color:var(--success)}
      .shop-dist{font-size:13px;font-weight:700;color:var(--accent);text-align:right}
      .map-placeholder{background:var(--surface);border-radius:14px;overflow:hidden;margin-bottom:12px;border:1px solid var(--border);position:relative}
      .map-img{width:100%;height:200px;object-fit:cover;display:block;opacity:0.7}
      .map-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
      .map-pin{font-size:32px}
      .map-lbl{font-size:13px;color:var(--text);font-weight:600;background:rgba(0,0,0,.6);padding:4px 12px;border-radius:999px}
      .dur-badge{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;font-size:11px;padding:3px 8px;border-radius:999px;display:flex;align-items:center;gap:4px}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="phone">
        <div class="sbar">
          <span class="sbar-t">9:41</span>
          <span class="sbar-t" style="font-size:10px">●●●● WiFi 🔋</span>
        </div>
        <div class="hdr" id="hdr">
          <span class="hdr-title" id="hdr-title">Home</span>
          <div class="avatar-circle">
            <svg width="18" height="18" fill="none" stroke="#F97316" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="6" r="3.5"/><path d="M2 17c0-3.9 3.1-7 7-7s7 3.1 7 7"/></svg>
          </div>
        </div>

        <div class="scr" id="screen"></div>

        <div class="tabbar">
          <div class="tab on" onclick="switchTab('home',this)" id="tab-home">
            <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1z"/><polyline points="9 21 9 12 15 12 15 21"/></svg>
            <span class="tab-lbl">Home</span>
          </div>
          <div class="tab" onclick="switchTab('tutorials',this)" id="tab-tutorials">
            <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
            <span class="tab-lbl">DIY</span>
          </div>
          <div class="tab" onclick="switchTab('hiring',this)" id="tab-hiring">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
            <span class="tab-lbl">Find Help</span>
          </div>
          <div class="tab" onclick="switchTab('location',this)" id="tab-location">
            <svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
            <span class="tab-lbl">Nearby</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      const TUTORIALS=[
        {id:'1',title:'Fix a Cracked Phone Screen',desc:'Step-by-step guide to replacing screens.',cat:'Smartphones',dur:'18 min',views:12400,rating:4.8,thumb:'https://picsum.photos/seed/tutorial1/400/220',author:'Marcus T.'},
        {id:'2',title:'Laptop Overheating? Clean Your Fan',desc:'Safely clean it in under 20 minutes.',cat:'Laptops',dur:'22 min',views:9800,rating:4.7,thumb:'https://picsum.photos/seed/tutorial2/400/220',author:'Priya N.'},
        {id:'3',title:'Wi-Fi Router Setup Basics',desc:'Configure your router properly.',cat:'Networking',dur:'14 min',views:15200,rating:4.9,thumb:'https://picsum.photos/seed/tutorial4/400/220',author:'Sam L.'}
      ];

      const TECHS=[
        {id:'t1',name:'Marcus Thompson',spec:'Phone Repair',skills:['Screen','Battery'],rate:45,avail:'Mon–Fri',rating:4.9,reviews:138,dist:'0.4 mi',status:'available',avatar:'https://i.pravatar.cc/100?img=12'},
        {id:'t2',name:'Priya Nair',spec:'Laptop Repair',skills:['SSD','Logic board'],rate:60,avail:'Tue–Sat',rating:4.8,reviews:92,dist:'0.9 mi',status:'available',avatar:'https://i.pravatar.cc/100?img=47'}
      ];

      const SHOPS=[
        {name:'QuickFix Electronics',spec:'General Repair',rating:4.7,reviews:312,dist:'0.3 mi',hours:'Open · Closes 8pm',addr:'148 Flatbush Ave'}
      ];

      function stars(r){return `<span class="star-row">★ ${r.toFixed(1)}</span>`}
      function badge(t,cls=''){return `<span class="badge ${cls}">${t}</span>`}
      function statusDot(s){
        const c = s === 'available' ? 'dot-avail' : 'dot-busy';
        return `<div class="status-dot"><div class="dot ${c}"></div><span class="dot-lbl">${s}</span></div>`;
      }

      function switchTab(t, el){
        document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
        el.classList.add('on');
        document.getElementById('hdr-title').textContent = t.charAt(0).toUpperCase() + t.slice(1);
        render(t);
      }

      function render(t){
        const s = document.getElementById('screen');
        if(t==='home') s.innerHTML = renderHome();
        else if(t==='tutorials') s.innerHTML = renderTutorials();
        else if(t==='hiring') s.innerHTML = renderHiring();
        else if(t==='location') s.innerHTML = renderLocation();
      }

      function renderHome(){
        return `<div class="pad">
          <div class="greeting">Good morning 👋</div>
          <div class="subgreet">What needs fixing today?</div>
          <div class="sec-hdr" style="margin-top:20px"><span class="sec-title">Popular Tutorials</span></div>
          ${TUTORIALS.map(tut => `<div class="recent-row"><img class="recent-thumb" src="${tut.thumb}"><div class="recent-title">${tut.title}</div></div>`).join('')}
        </div>`;
      }

      function renderTutorials(){
        return `<div class="pad">
          <div class="searchbar"><input placeholder="Search tutorials..."></div>
          ${TUTORIALS.map(t => `<div class="tcard-v"><img src="${t.thumb}"><div class="tcard-v-body"><h3>${t.title}</h3><p>${t.desc}</p></div></div>`).join('')}
        </div>`;
      }

      function renderHiring(){
        return `<div class="pad">
          ${TECHS.map(tech => `<div class="tech-card"><strong>${tech.name}</strong><br>${tech.spec} - $${tech.rate}/hr</div>`).join('')}
        </div>`;
      }

      function renderLocation(){
        return `<div class="pad">
          <div class="map-placeholder"><img class="map-img" src="https://picsum.photos/seed/map/400/200"><div class="map-overlay"><div class="map-lbl">Brooklyn, NY</div></div></div>
          ${SHOPS.map(shop => `<div class="shop-card"><div>${shop.name}</div><div class="shop-dist">${shop.dist}</div></div>`).join('')}
        </div>`;
      }

      // Initial Render
      render('home');
    </script>
  </body>
  </html>
